<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I have a question... 🙃</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #ffe6e6; font-family: sans-serif; overflow: hidden; text-align: center; }
        #card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 85%; max-width: 400px; z-index: 10; }
        img { width: 100%; max-width: 220px; border-radius: 15px; margin-bottom: 10px; }
        h1 { color: #ff4d6d; font-size: 1.5rem; }
        .btn-group { margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 20px; min-height: 100px; }
        button { padding: 15px 25px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; transition: transform 0.2s; }
        #yesBtn { background-color: #2ecc71; color: white; z-index: 1; }
        #noBtn { background-color: #ff4d6d; color: white; position: absolute; z-index: 999; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="card">
        <div id="ask">
            <img src=https://media1.giphy.com/media/v1.Y2lkPTZjMDliOTUya3I2bHp3dTF0ZTR1bmpoMXBwbmlka2piM3QzaDV2bTV3NTBqb3Y5MyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/TjSPQgowhhJdHgvnwA/giphy.gif
            <h1>Will you be my girlfriend? ❤️</h1>
            <div class="btn-group">
                <button id="yesBtn">Yes!</button>
                <button id="noBtn">No</button>
            </div>
        </div>
        <div id="celebrate" class="hidden">
            <img src=https://media1.giphy.com/media/v1.Y2lkPTZjMDliOTUyYnhucWRhOXVvd2xueHVtbnB6bHU0ZHBvd2p6YXE2NjRuanUzb2preSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/85NbGstFaElEO1Wusd/giphy.gif
            <h1>I LOVE YOUUUU! </h1>
        </div>
    </div>
    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        let yesSize = 1;
        let noSize = 1;

        const move = () => {
            // Move the button to a random spot
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            // Yes button grows
            yesSize += 0.3;
            yesBtn.style.transform = `scale(${yesSize})`;

            // No button shrinks (stops at 0.2 so it doesn't disappear completely too fast)
            if (noSize > 0.2) {
                noSize -= 0.1;
                noBtn.style.transform = `scale(${noSize})`;
            }
        };

        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); move(); });
        noBtn.addEventListener('mouseover', move);

        yesBtn.addEventListener('click', () => {
            document.getElementById('ask').classList.add('hidden');
            document.getElementById('celebrate').classList.remove('hidden');
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        });
    </script>
</body>
</html>
