<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I have a question...</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #ffe6e6; font-family: sans-serif; overflow: hidden; }
        #card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 85%; max-width: 350px; text-align: center; min-height: 400px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .gif-container { width: 100%; height: 200px; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; }
        img { max-width: 100%; max-height: 100%; border-radius: 15px; object-fit: contain; }
        h1 { color: #ff4d6d; font-size: 1.5rem; margin: 15px 0; }
        .btn-group { display: flex; justify-content: center; align-items: center; gap: 15px; min-height: 150px; width: 100%; position: relative; }
        button { padding: 12px 25px; font-size: 1rem; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; }
        #yesBtn { background-color: #2ecc71; color: white; z-index: 10; transition: transform 0.2s; }
        #noBtn { background-color: #ff4d6d; color: white; z-index: 5; transition: transform 0.2s; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
        <source src="music.mp3.mp3" type="audio/mpeg">
    </audio>

    <div id="card">
        <div id="ask">
            <div class="gif-container">
                <img src=https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUyaGVxZG1weWo2cXdjY2JpaTNoaWsybmQ3NmVyOXBnMW9zdjl3cno1bSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/YZOsKxJfmvzG0/giphy.gif
            </div>
            <h1>Will you be my girlfriend? ❤️</h1>
            <div class="btn-group">
                <button id="yesBtn">Yes!</button>
                <button id="noBtn">No</button>
            </div>
        </div>

        <div id="celebrate" class="hidden">
            <div class="gif-container">
                <img src=https://media1.giphy.com/media/v1.Y2lkPTZjMDliOTUyaGoxN3hsczQ5N2wwY3FwNGJtdjJ6bGFpZ3lzcWpwMWd2YTZrMDQyOCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/wvYNSqBAMDVx8CEYkt/giphy.gif
            </div>
            <h1 style="font-size: 2rem;">I LOVE YOUUUU!! </h1>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const music = document.getElementById('bgMusic');
        let yesSize = 1;

        const handleNo = () => {
            yesSize += 0.4;
            yesBtn.style.transform = `scale(${yesSize})`;
            let currentNoScale = parseFloat(noBtn.style.transform.replace('scale(', '')) || 1;
            if (currentNoScale > 0.3) {
                noBtn.style.transform = `scale(${currentNoScale - 0.15})`;
            }
        };

        noBtn.addEventListener('click', handleNo);
        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleNo(); });

        yesBtn.addEventListener('click', () => {
            music.play().catch(e => console.log("Audio play blocked"));
            document.getElementById('ask').classList.add('hidden');
            document.getElementById('celebrate').classList.remove('hidden');
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        });
    </script>
</body>
</html>
