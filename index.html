<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I have a question...</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #ffe6e6; font-family: sans-serif; overflow: hidden; }
        #card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 90%; max-width: 350px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        
        .gif-container { width: 100%; display: flex; justify-content: center; margin-bottom: 10px; min-height: 200px; }
        img { max-width: 100%; border-radius: 15px; height: auto; object-fit: contain; }
        
        h1 { color: #ff4d6d; font-size: 1.4rem; margin: 10px 0; }
        
        /* Buttons stay at the bottom */
        .btn-group { display: flex; justify-content: center; align-items: center; gap: 15px; width: 100%; min-height: 150px; margin-top: auto; }
        
        button { padding: 12px 25px; font-size: 1rem; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; transition: transform 0.2s; }
        #yesBtn { background-color: #2ecc71; color: white; z-index: 10; }
        #noBtn { background-color: #ff4d6d; color: white; z-index: 5; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
        <source src="music.mp3.mp3" type="audio/mpeg">
    </audio>

    <div id="card">
        <div id="ask">
            <div class="gif-container">
                <img src="https://media.tenor.com/S-K-n7Yy66MAAAAC/peach-goma.gif">
            </div>
            <h1>Will you be my girlfriend? ❤️</h1>
            <div class="btn-group">
                <button id="yesBtn">Yes!</button>
                <button id="noBtn">No</button>
            </div>
        </div>

        <div id="celebrate" class="hidden">
            <div class="gif-container">
                <img src="https://media.tenor.com/oGme0jFXriVAAAAC/love.gif">
            </div>
            <h1 style="font-size: 2rem;">I LOVE YOUUUU!! </h1>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const music = document.getElementById('bgMusic');

        const handleNo = () => {
            // Yes button grows
            let currentScale = parseFloat(yesBtn.style.transform.replace('scale(', '')) || 1;
            yesBtn.style.transform = `scale(${currentScale + 0.4})`;
            
            // No button shrinks
            let noScale = parseFloat(noBtn.style.transform.replace('scale(', '')) || 1;
            if (noScale > 0.3) {
                noBtn.style.transform = `scale(${noScale - 0.15})`;
            }
        };

        noBtn.addEventListener('click', handleNo);
        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleNo(); });

        yesBtn.addEventListener('click', () => {
            music.play().catch(e => console.log("Music blocked"));
            document.getElementById('ask').classList.add('hidden');
            document.getElementById('celebrate').classList.remove('hidden');
            
            // Heart Explosion logic
            const scalar = 2;
            const heart = confetti.shapeFromText({ text: '❤️', scalar });

            confetti({
                shapes: [heart],
                particleCount: 100,
                spread: 90,
                origin: { y: 0.6 },
                scalar
            });
        });
    </script>
</body>
</html>
