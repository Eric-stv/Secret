<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I have a question... ❤️🙃</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #ffe6e6; 
            font-family: sans-serif; 
            overflow: hidden; 
            position: relative;
        }

        /* ENDLESS CHAIN BACKGROUND */
        .heart-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }

        .heart-row {
            font-size: 14px; 
            color: #ffb3c1;
            display: flex;
            flex-direction: column;
            gap: 15px; 
            opacity: 0.6;
        }

        .up { animation: floatUp 10s linear infinite; }
        .down { animation: floatDown 10s linear infinite; }

        @keyframes floatUp {
            from { transform: translateY(0); }
            to { transform: translateY(-50%); }
        }

        @keyframes floatDown {
            from { transform: translateY(-50%); }
            to { transform: translateY(0); }
        }

        #card { 
            background: rgba(255, 255, 255, 0.93); 
            padding: 25px; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.2); 
            width: 88%; 
            max-width: 350px; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 420px;
            z-index: 10;
        }
        
        .gif-container { width: 100%; height: 210px; display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
        img { max-width: 100%; max-height: 100%; border-radius: 15px; object-fit: contain; }
        
        h1 { color: #ff4d6d; font-size: 1.4rem; margin: 10px 0; font-weight: bold; min-height: 60px; display: flex; align-items: center; justify-content: center; }
        
        .btn-group { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 20px; 
            width: 100%; 
            height: 130px; 
            margin-top: auto; 
            position: relative;
        }
        
        button { padding: 12px 30px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; }
        
        #yesBtn { 
            background-color: #2ecc71; 
            color: white; 
            z-index: 20; 
            transition: transform 0.2s ease;
        }
        
        #noBtn { 
            background-color: #ff4d6d; 
            color: white; 
            z-index: 5; 
            transition: transform 0.2s ease, opacity 0.2s;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="heart-bg">
        <div class="heart-row up">💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕</div>
        <div class="heart-row down">💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕</div>
        <div class="heart-row up">💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕</div>
        <div class="heart-row down">💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕</div>
        <div class="heart-row up">💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕</div>
        <div class="heart-row down">💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕</div>
    </div>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
        <source src="music.mp3.mp3" type="audio/mpeg">
    </audio>

    <div id="card">
        <div id="ask">
            <div class="gif-container">
                <img src="https://media.giphy.com/media/YZOsKxJfmvzG0/giphy.gif">
            </div>
            <h1 id="questionText">Will you be my girlfriend? ❤️🙃</h1>
            <div class="btn-group">
                <button id="yesBtn">Yes!</button>
                <button id="noBtn">No</button>
            </div>
        </div>

        <div id="celebrate" class="hidden">
            <div class="gif-container">
                <img src="https://media.giphy.com/media/ytu2GUYbvhz7zShGwS/giphy.gif">
            </div>
            <h1 style="font-size: 2rem;">I LOVE YOUUUU!! 💗</h1>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const questionText = document.getElementById('questionText');
        const music = document.getElementById('bgMusic');

        const phrases = [
            "Are you sure? 🥺",
            "Really sure?? 🤨",
            "Think again! 😩",
            "Last chance! 😭",
            "Surely not? 💔",
            "You're breaking my heart... 😰",
            "Don't do this! 🛑",
            "Give it another thought! ✨",
            "Please? 🥺🙏"
        ];

        const handleNo = () => {
            // Update Question Text
            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            questionText.innerText = randomPhrase;

            // Grow Yes
            let currentScale = parseFloat(yesBtn.style.transform.replace('scale(', '')) || 1;
            yesBtn.style.transform = `scale(${currentScale + 0.5})`;
            
            // Shrink and Fade No
            let noScale = parseFloat(noBtn.style.transform.replace('scale(', '')) || 1;
            let nextScale = noScale - 0.15;
            
            if (nextScale <= 0.1) {
                noBtn.style.display = 'none'; // Make it disappear
            } else {
                noBtn.style.transform = `scale(${nextScale})`;
                noBtn.style.opacity = nextScale + 0.3; // Fade out as it shrinks
            }
        };

        noBtn.addEventListener('click', handleNo);
        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleNo(); });

        yesBtn.addEventListener('click', () => {
            music.play().catch(e => console.log("Music blocked"));
            document.getElementById('ask').classList.add('hidden');
            document.getElementById('celebrate').classList.remove('hidden');
            
            var duration = 4 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
            var colors = ['#ff0000', '#ff4d6d', '#ff85a1'];

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
              var timeLeft = animationEnd - Date.now();
              if (timeLeft <= 0) { return clearInterval(interval); }
              var particleCount = 40 * (timeLeft / duration);
              confetti(Object.assign({}, defaults, { particleCount, colors, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
              confetti(Object.assign({}, defaults, { particleCount, colors, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        });
    </script>
</body>
</html>
