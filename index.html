<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I have a question...</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #ffe6e6; 
            font-family: sans-serif; 
            overflow: hidden; 
            position: relative;
        }

        /* ENDLESS SMALL HEARTS BACKGROUND */
        .heart-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
        }

        .heart-row {
            font-size: 14px; 
            color: #ffb3c1;
            display: flex;
            flex-direction: column;
            gap: 30px; 
        }

        .up { animation: floatUp 12s linear infinite; }
        .down { animation: floatDown 12s linear infinite; }

        @keyframes floatUp {
            from { transform: translateY(100vh); }
            to { transform: translateY(-100vh); }
        }

        @keyframes floatDown {
            from { transform: translateY(-100vh); }
            to { transform: translateY(100vh); }
        }

        /* CARD STYLING */
        #card { 
            background: rgba(255, 255, 255, 0.9); 
            padding: 25px; 
            border-radius: 25px; 
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.2); 
            width: 85%; 
            max-width: 340px; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 400px;
            z-index: 10;
        }
        
        .gif-container { width: 100%; height: 200px; display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
        img { max-width: 100%; max-height: 100%; border-radius: 15px; object-fit: contain; }
        h1 { color: #ff4d6d; font-size: 1.3rem; margin: 10px 0; }
        
        /* BUTTON LAYOUT FIXES */
        .btn-group { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 20px; 
            width: 100%; 
            height: 120px; 
            margin-top: auto; 
            position: relative;
        }
        
        button { padding: 12px 28px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; }
        
        #yesBtn { 
            background-color: #2ecc71; 
            color: white; 
            z-index: 20; 
            transition: transform 0.2s ease;
        }
        
        #noBtn { 
            background-color: #ff4d6d; 
            color: white; 
            z-index: 5; 
            transition: transform 0.2s ease;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="heart-bg">
        <div class="heart-row up">💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕</div>
        <div class="heart-row down">💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕</div>
        <div class="heart-row up">💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕</div>
        <div class="heart-row down">💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕</div>
        <div class="heart-row up">💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕</div>
        <div class="heart-row down">💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕<br>💕</div>
    </div>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
        <source src="music.mp3.mp3" type="audio/mpeg">
    </audio>

    <div id="card">
        <div id="ask">
            <div class="gif-container">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHYybmZueXp3bmZ6eXp3bmZ6eXp3bmZ6eXp3bmZ6eXp3bmZ6eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/qUIm586OTazL2/giphy.gif">
            </div>
            <h1>Will you be my girlfriend? ❤️🙃</h1>
            <div class="btn-group">
                <button id="yesBtn">Yes!</button>
                <button id="noBtn">No</button>
            </div>
        </div>

        <div id="celebrate" class="hidden">
            <div class="gif-container">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnJueXp3bmZ6eXp3bmZ6eXp3bmZ6eXp3bmZ6eXp3bmZ6eCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/l41lI4bYI0fKxMzyU/giphy.gif">
            </div>
            <h1 style="font-size: 2rem;">I LOVE YOUUUU!! 💗</h1>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const music = document.getElementById('bgMusic');

        const handleNo = () => {
            let currentScale = parseFloat(yesBtn.style.transform.replace('scale(', '')) || 1;
            yesBtn.style.transform = `scale(${currentScale + 0.45})`;
            
            let noScale = parseFloat(noBtn.style.transform.replace('scale(', '')) || 1;
            if (noScale > 0.2) {
                noBtn.style.transform = `scale(${noScale - 0.15})`;
            }
        };

        noBtn.addEventListener('click', handleNo);
        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleNo(); });

        yesBtn.addEventListener('click', () => {
            music.play().catch(e => console.log("Music blocked"));
            document.getElementById('ask').classList.add('hidden');
            document.getElementById('celebrate').classList.remove('hidden');
            
            var duration = 4 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
            var colors = ['#ff0000', '#ff4d6d', '#ff85a1'];

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
              var timeLeft = animationEnd - Date.now();
              if (timeLeft <= 0) { return clearInterval(interval); }
              var particleCount = 40 * (timeLeft / duration);
              confetti(Object.assign({}, defaults, { particleCount, colors, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
              confetti(Object.assign({}, defaults, { particleCount, colors, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        });
    </script>
</body>
</html>
